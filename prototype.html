<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PureClean 最终原型 V1.1（与实现同步）</title>
<style>
  :root {
    --bg:#161924; --card:#222630; --border:rgba(255,255,255,.06);
    --accent:#33CC7A; --accent-dim:rgba(51,204,122,.18);
    --t1:rgba(255,255,255,.92); --t2:rgba(255,255,255,.55);
    --danger:#FF6B6B; --r:16px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
  body{background:#0b0d13;color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;
    display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:24px 12px}
  h1.proto{font-size:15px;font-weight:600;color:var(--t2);margin-bottom:4px}
  p.proto{font-size:12px;color:rgba(255,255,255,.35);margin-bottom:18px;text-align:center;max-width:640px}
  .phone{width:390px;height:800px;background:var(--bg);border-radius:48px;border:6px solid #2a2e3a;
    position:relative;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.6);flex-shrink:0}
  .notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:120px;height:26px;
    background:#0b0d13;border-radius:14px;z-index:50}
  .screen{position:absolute;inset:0;padding:56px 20px 28px;display:flex;flex-direction:column;
    opacity:0;pointer-events:none;transition:opacity .25s;overflow-y:auto}
  .screen.active{opacity:1;pointer-events:auto}
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px}
  .btn-primary{width:100%;padding:16px;border:none;border-radius:var(--r);background:var(--accent);
    color:#000;font-size:17px;font-weight:600;cursor:pointer;transition:opacity .15s}
  .btn-primary:active{opacity:.8}
  .btn-primary:disabled{background:var(--card);color:var(--t2);cursor:default}
  .btn-text{background:none;border:none;color:var(--accent);font-size:14px;cursor:pointer;padding:8px}
  .caption{font-size:11px;color:var(--t2);text-align:center}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .logo{font-size:22px;font-weight:700;display:flex;align-items:center;gap:8px}
  .logo svg{width:26px;height:26px}
  .pro-badge{font-size:10px;font-weight:800;color:var(--accent);background:var(--accent-dim);
    padding:3px 8px;border-radius:99px;display:none}
  body.is-pro .pro-badge{display:inline-block}
  .gear{font-size:18px;color:var(--t2);cursor:pointer;background:none;border:none}
  .ring-wrap{display:flex;justify-content:center;margin:10px 0 20px}
  .ring{position:relative;width:180px;height:180px}
  .ring svg{transform:rotate(-90deg)}
  .ring .label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
  .ring .big{font-size:26px;font-weight:700}
  .ring .sub{font-size:12px;color:var(--t2)}
  .feature{display:flex;gap:14px;align-items:center;margin-bottom:12px}
  .feature .ico{width:36px;font-size:20px;text-align:center}
  .feature .tt{font-size:14px;font-weight:600}
  .feature .ss{font-size:11.5px;color:var(--t2);margin-top:2px}
  .scan-center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
  .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700}
  .sec-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .sec-title{font-size:14px;font-weight:600}
  .sec-meta{font-size:13px;color:var(--accent)}
  .note{font-size:11.5px;color:var(--t2)}
  .hint{font-size:10.5px;color:var(--t2);margin-bottom:8px}
  .thumb-row{display:flex;gap:8px;overflow-x:auto;padding:4px 0}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .thumb{position:relative;width:96px;height:96px;flex-shrink:0;border-radius:12px;overflow:hidden;cursor:pointer}
  .grid3 .thumb{width:100%;aspect-ratio:1;height:auto}
  .thumb .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:34px}
  .thumb .chk{position:absolute;top:5px;right:5px;width:24px;height:24px;border-radius:50%;
    border:1.5px solid rgba(255,255,255,.75);background:rgba(0,0,0,.3);display:flex;align-items:center;
    justify-content:center;font-size:14px;color:transparent;transition:all .15s}
  .thumb.sel .chk{background:var(--accent);border-color:var(--accent);color:#000}
  .thumb.sel::after{content:"";position:absolute;inset:0;border:2px solid var(--accent);border-radius:12px}
  .thumb.keeper{filter:saturate(.3);opacity:.55;cursor:default}
  .thumb.keeper .chk{display:none}
  .thumb.cloud{cursor:default}
  .thumb.cloud .chk{display:none}
  .keep-tag{position:absolute;top:5px;right:5px;font-size:10px;font-weight:800;background:var(--accent);
    color:#000;padding:3px 7px;border-radius:99px}
  .dur-tag{position:absolute;bottom:5px;left:5px;font-size:9px;background:rgba(0,0,0,.55);
    padding:2px 5px;border-radius:6px;color:#fff}
  .group-meta{display:flex;justify-content:space-between;font-size:11.5px;color:var(--t2);margin:8px 0 4px}
  .group-meta b{color:var(--accent);font-weight:600}
  .bottom-bar{position:sticky;bottom:0;margin:12px -20px -28px;padding:12px 20px 26px;
    background:linear-gradient(transparent,var(--bg) 24%)}
  .back{background:none;border:none;color:var(--t2);font-size:14px;cursor:pointer}
  .result-center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center}
  .check-big{width:84px;height:84px;border-radius:50%;background:var(--accent-dim);display:flex;
    align-items:center;justify-content:center;font-size:42px;color:var(--accent);
    animation:pop .45s cubic-bezier(.2,1.6,.4,1)}
  @keyframes pop{from{transform:scale(.3);opacity:0}}
  .spinner{width:38px;height:38px;border-radius:50%;border:3.5px solid var(--card);
    border-top-color:var(--accent);animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  /* 弹层 */
  .sheet-mask{position:absolute;inset:0;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;
    transition:opacity .25s;z-index:60}
  .sheet-mask.open{opacity:1;pointer-events:auto}
  .sheet{position:absolute;left:0;right:0;bottom:0;max-height:88%;background:var(--bg);
    border-radius:24px 24px 0 0;padding:14px 20px 30px;transform:translateY(105%);
    transition:transform .3s cubic-bezier(.3,1,.3,1);z-index:61;overflow-y:auto;border-top:1px solid var(--border)}
  .sheet.open{transform:translateY(0)}
  .grabber{width:40px;height:5px;border-radius:99px;background:var(--card);margin:0 auto 16px}
  .benefit{display:flex;gap:12px;align-items:center;padding:8px 0;font-size:14px}
  .benefit .ico{width:26px;text-align:center}
  .lang-row{display:flex;justify-content:space-between;align-items:center;padding:13px 0;
    border-bottom:1px solid var(--border);font-size:14px;cursor:pointer}
  .lang-row .tick{color:var(--accent)}
  .switch{position:relative;width:46px;height:28px;border-radius:99px;background:var(--card);
    cursor:pointer;transition:background .2s;border:1px solid var(--border)}
  .switch::after{content:"";position:absolute;top:2px;left:2px;width:22px;height:22px;
    border-radius:50%;background:#fff;transition:left .2s}
  .switch.on{background:var(--accent)}
  .switch.on::after{left:20px}
  /* iOS 风格系统弹窗 */
  .ios-alert-mask{position:absolute;inset:0;background:rgba(0,0,0,.45);display:none;
    align-items:center;justify-content:center;z-index:80}
  .ios-alert-mask.open{display:flex}
  .ios-alert{width:272px;background:rgba(38,42,54,.97);border-radius:14px;overflow:hidden;
    backdrop-filter:blur(20px);text-align:center;animation:pop .25s}
  .ios-alert .ti{font-size:16px;font-weight:600;padding:18px 16px 6px}
  .ios-alert .msg{font-size:12.5px;color:var(--t2);padding:0 16px 16px;line-height:1.5}
  .ios-alert .btns{display:flex;border-top:.5px solid rgba(255,255,255,.15)}
  .ios-alert .btns button{flex:1;padding:12px;background:none;border:none;font-size:16px;cursor:pointer}
  .ios-alert .btns button + button{border-left:.5px solid rgba(255,255,255,.15)}
  .b-red{color:var(--danger);font-weight:600}
  .b-blue{color:#4da3ff}
  /* 大图查看器 */
  .viewer{position:absolute;inset:0;background:#000;z-index:70;display:none;flex-direction:column}
  .viewer.open{display:flex}
  .viewer .stage{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:grab}
  .viewer .pic{font-size:160px;transition:transform .18s;will-change:transform}
  .viewer .close{position:absolute;top:52px;right:16px;font-size:28px;color:rgba(255,255,255,.85);
    background:none;border:none;cursor:pointer;z-index:2}
  .viewer .foot{padding:0 20px 26px;display:flex;flex-direction:column;gap:10px;align-items:center}
  .viewer .vbtn{width:100%;padding:15px;border-radius:var(--r);border:none;font-size:16px;
    font-weight:600;cursor:pointer}
  .hd-btn{background:rgba(255,255,255,.12);color:var(--accent);border:none;border-radius:99px;
    padding:8px 14px;font-size:12.5px;font-weight:600;cursor:pointer}
  .progress{width:180px;height:4px;border-radius:99px;background:var(--card);overflow:hidden}
  .progress i{display:block;height:100%;background:var(--accent);width:0%;transition:width .2s}
  .toast{position:absolute;top:64px;left:50%;transform:translateX(-50%);background:#2c313e;
    padding:10px 18px;border-radius:99px;font-size:13px;opacity:0;transition:all .3s;z-index:90;
    white-space:nowrap;border:1px solid var(--border)}
  .toast.show{opacity:1}
  @media (max-width:430px){.phone{width:100%;height:88vh;border-radius:36px}}
</style>
</head>
<body>
  <h1 class="proto">PureClean · 最终原型 V1.1（与 App 实现 1:1 同步）</h1>
  <p class="proto">订阅门控：识别+手动勾选免费 ｜ 批量（默认勾选/全选/深扫/自动清理）= Pro，在「想一键清理」时触发 Paywall<br>
  交互：轻点勾选 · 长按看大图（双击缩放/拖移/iCloud 载入高清）· 保留项置灰锁定 · 单次确认</p>

  <div class="phone">
    <div class="notch"></div>
    <div class="toast" id="toast"></div>

    <!-- P1 首页 -->
    <div class="screen active" id="s-home">
      <div class="topbar">
        <span class="logo">
          <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="34" stroke="#33CC7A" stroke-width="9" fill="none" stroke-dasharray="150 64" stroke-linecap="round" transform="rotate(-60 50 50)"/><path d="M76 30 Q79 39 88 42 Q79 45 76 54 Q73 45 64 42 Q73 39 76 30Z" fill="#7FF0B2"/></svg>
          PureClean <span class="pro-badge">PRO</span></span>
        <button class="gear" onclick="openSheet('settings')">⚙︎</button>
      </div>
      <div class="ring-wrap"><div class="ring">
        <svg width="180" height="180" viewBox="0 0 180 180">
          <circle cx="90" cy="90" r="80" fill="none" stroke="var(--card)" stroke-width="14"/>
          <circle cx="90" cy="90" r="80" fill="none" stroke="var(--accent)" stroke-width="14"
            stroke-linecap="round" stroke-dasharray="502.65" stroke-dashoffset="135.7"/>
        </svg>
        <div class="label"><div class="big">93.4 GB</div><div class="sub" data-i="home.used"></div></div>
      </div></div>
      <div class="card feature"><div class="ico">💾</div><div><div class="tt" data-i="home.cache"></div><div class="ss" data-i="home.cache.sub"></div></div></div>
      <div class="card feature"><div class="ico">🗑️</div><div><div class="tt" data-i="home.junk"></div><div class="ss" data-i="home.junk.sub"></div></div></div>
      <div class="card feature"><div class="ico">🖼️</div><div><div class="tt" data-i="home.photos"></div><div class="ss" data-i="home.photos.sub"></div></div></div>
      <div style="flex:1"></div>
      <p class="caption" style="margin-bottom:12px" data-i="home.privacy"></p>
      <button class="btn-primary" onclick="startScan()" data-i="home.scan"></button>
      <button class="btn-text" id="upgradeEntry" onclick="openSheet('paywall')" data-i="home.upgrade"></button>
    </div>

    <!-- P2 扫描中 -->
    <div class="screen" id="s-scan"><div class="scan-center">
      <div class="ring" style="width:160px;height:160px">
        <svg width="160" height="160" viewBox="0 0 160 160">
          <circle cx="80" cy="80" r="70" fill="none" stroke="var(--card)" stroke-width="10"/>
          <circle id="scanRing" cx="80" cy="80" r="70" fill="none" stroke="var(--accent)" stroke-width="10"
            stroke-linecap="round" stroke-dasharray="439.8" stroke-dashoffset="439.8"/>
        </svg><div class="pct" id="scanPct">0%</div>
      </div>
      <div style="color:var(--t2);font-size:15px" data-i="scan.running"></div>
      <div style="color:var(--accent);font-size:12px" data-i="scan.local"></div>
    </div></div>

    <!-- P3 预览 -->
    <div class="screen" id="s-preview">
      <div class="topbar">
        <button class="back" onclick="goHome()" data-i="common.back"></button>
        <span style="font-size:16px;font-weight:600" data-i="preview.title"></span>
        <span style="width:32px"></span>
      </div>
      <div class="card" style="margin-bottom:12px">
        <div class="sec-head"><span class="sec-title" data-i="preview.junk"></span><span class="sec-meta">128 MB</span></div>
        <div class="note" data-i="preview.junk.note"></div>
      </div>
      <div class="card" style="margin-bottom:12px">
        <div class="sec-head">
          <span class="sec-title" data-i="preview.duplicates"></span>
          <button class="btn-text" style="padding:0;font-size:12px;font-weight:600" onclick="selectAllToggle()" id="selAllBtn"></button>
        </div>
        <div class="hint" data-i="preview.hint"></div>
        <div id="dupGroups"></div>
        <div class="hint" id="icloudNote" style="margin-top:6px">☁️ <span></span></div>
        <button class="btn-text" style="padding:6px 0 0;font-size:12px" onclick="openSheet('paywall')" id="deepHint" data-i="preview.deepHint"></button>
      </div>
      <div class="card" style="margin-bottom:12px">
        <div class="sec-head"><span class="sec-title" data-i="preview.screenshots"></span><span class="sec-meta" style="color:var(--t2)" id="shotCount"></span></div>
        <div class="grid3" id="shotGrid"></div>
      </div>
      <div class="card">
        <div class="sec-head"><span class="sec-title" data-i="preview.largeVideos"></span><span class="sec-meta" style="color:var(--t2)">1</span></div>
        <div class="grid3" id="videoGrid"></div>
      </div>
      <div class="bottom-bar">
        <p class="caption" style="margin-bottom:8px" data-i="preview.recoverNote"></p>
        <button class="btn-primary" id="cleanBtn" onclick="tryClean()"></button>
      </div>
    </div>

    <!-- P4/P5 清理中/完成 -->
    <div class="screen" id="s-cleaning"><div class="result-center">
      <div class="spinner"></div><div style="color:var(--t2)" data-i="clean.running"></div>
    </div></div>
    <div class="screen" id="s-done">
      <div class="result-center">
        <div class="check-big">✓</div>
        <div style="font-size:22px;font-weight:700" data-i="result.title"></div>
        <div style="color:var(--t2)" id="freedTxt"></div>
        <p class="caption" data-i="result.recover"></p>
      </div>
      <button class="btn-primary" onclick="goHome()" data-i="common.done"></button>
    </div>

    <!-- 大图查看器（长按缩略图进入） -->
    <div class="viewer" id="viewer">
      <button class="close" onclick="closeViewer()">✕</button>
      <div class="stage" id="vStage"><div class="pic" id="vPic">🌅</div></div>
      <div class="foot" id="vFoot"></div>
    </div>

    <!-- 弹层 -->
    <div class="sheet-mask" id="mask" onclick="closeSheets()"></div>

    <!-- Paywall -->
    <div class="sheet" id="sheet-paywall">
      <div class="grabber"></div>
      <div style="text-align:center;font-size:34px">✨</div>
      <div style="text-align:center;font-size:21px;font-weight:700;margin:8px 0 16px">PureClean Pro</div>
      <div class="card" style="margin-bottom:16px">
        <div class="benefit"><span class="ico">🗂️</span><span data-i="paywall.batch"></span></div>
        <div class="benefit"><span class="ico">🔍</span><span data-i="paywall.deep"></span></div>
        <div class="benefit"><span class="ico">🔄</span><span data-i="paywall.auto"></span></div>
      </div>
      <p style="text-align:center;color:var(--accent);font-size:13px;margin-bottom:12px" data-i="paywall.trialDays3"></p>
      <button class="btn-primary" onclick="subscribe()" data-i="paywall.subscribe10"></button>
      <div style="text-align:center;margin-top:6px">
        <button class="btn-text" style="color:var(--t2);font-size:12px" onclick="showToast(t('restore.none'))" data-i="paywall.restore"></button>
      </div>
      <p class="caption" data-i="paywall.terms"></p>
      <p class="caption" style="margin-top:6px"><u data-i="paywall.links.terms"></u> &nbsp; <u data-i="paywall.links.privacy"></u></p>
    </div>

    <!-- 设置 -->
    <div class="sheet" id="sheet-settings">
      <div class="grabber"></div>
      <div style="font-size:18px;font-weight:700;margin-bottom:14px" data-i="settings.title"></div>
      <div style="font-size:12px;color:var(--t2);margin-bottom:6px" data-i="settings.language"></div>
      <div class="card" style="padding:2px 16px;margin-bottom:16px" id="langList"></div>
      <div style="font-size:12px;color:var(--t2);margin-bottom:6px" data-i="settings.pro"></div>
      <div class="card" style="margin-bottom:16px">
        <div style="font-size:13px;padding-bottom:10px;border-bottom:1px solid var(--border)" id="subStatus"></div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)">
          <span style="font-size:14px" data-i="settings.autoClean"></span>
          <div class="switch" id="autoSwitch" onclick="toggleAuto()"></div>
        </div>
        <div style="padding-top:10px"><button class="btn-text" style="padding:0;font-size:14px" id="manageBtn" onclick="manageSub()"></button></div>
      </div>
      <div style="font-size:12px;color:var(--t2);margin-bottom:6px" data-i="settings.privacy"></div>
      <div class="card">
        <div class="lang-row" style="border:none" onclick="openSheet('privacy')">
          <span data-i="settings.privacy.view"></span><span style="color:var(--t2)">›</span>
        </div>
      </div>
    </div>

    <!-- 隐私声明弹窗 -->
    <div class="sheet" id="sheet-privacy">
      <div class="grabber"></div>
      <div style="font-size:18px;font-weight:700;margin-bottom:14px" data-i="settings.privacy.view"></div>
      <p style="font-size:13.5px;line-height:1.7;color:var(--t1)" data-i="settings.privacy.body"></p>
      <button class="btn-primary" style="margin-top:18px" onclick="closeSheets()" data-i="common.done"></button>
    </div>

    <!-- iOS 系统删除确认（含照片时唯一确认；Apple 强制） -->
    <div class="ios-alert-mask" id="sysAlert"><div class="ios-alert">
      <div class="ti" id="sysTi"></div>
      <div class="msg" data-i="sys.deleteMsg"></div>
      <div class="btns">
        <button class="b-blue" onclick="hideSys()" data-i="sys.dontAllow"></button>
        <button class="b-red" onclick="confirmSysDelete()" data-i="sys.delete"></button>
      </div>
    </div></div>
    <!-- 自家确认（仅清缓存、系统不弹框时） -->
    <div class="ios-alert-mask" id="ownAlert"><div class="ios-alert">
      <div class="ti" data-i="confirm.title"></div>
      <div class="msg" id="ownMsg"></div>
      <div class="btns">
        <button class="b-blue" onclick="hideOwn()" data-i="common.cancel"></button>
        <button class="b-red" onclick="confirmOwnClean()" data-i="confirm.ok"></button>
      </div>
    </div></div>
  </div>

<script>

const LANG_NAMES = {"zh-Hans":"简体中文","zh-Hant":"繁體中文","en":"English","es":"Español"};
let langPref = "";              // "" = 跟随系统
function curLang(){ return langPref || "zh-Hans"; }
function t(k,...a){ let s=(I18N[curLang()]&&I18N[curLang()][k])||I18N["en"][k]||k;
  a.forEach((v,i)=>s=s.replace("{"+i+"}",v)); return s; }
function applyLang(){ document.querySelectorAll("[data-i]").forEach(el=>el.textContent=t(el.dataset.i));
  renderLangList(); renderPreview(); updateCleanBtn(); renderSubUI(); }

/* ============ 状态（镜像 AppState） ============ */
let isPro=false, autoClean=false;
const GB=1024**3, MB=1024**2;
const state={
  junk:128*MB,
  groups:[ // first = keeper(最高清，置灰锁定)
    {similar:false,emojis:["🌅","🌅","🌅"],hues:[16,18,15],sizes:[4.2,4.2,4.1]},
    {similar:false,emojis:["🐱","🐱"],hues:[210,212],sizes:[3.1,3.1]},
    {similar:true, emojis:["🏔️","🏔️","🏔️","🏔️"],hues:[150,152,148,155],sizes:[5.0,4.9,5.1,4.8]},
  ],
  shots:[{emoji:"💬",hue:200,size:1.8},{emoji:"🗺️",hue:230,size:1.8},
         {emoji:"☁️",hue:215,size:1.8,cloud:true},   // iCloud 仅云端：占位+不可选，可在大图载入高清
         {emoji:"📊",hue:260,size:1.8},{emoji:"🛒",hue:290,size:1.8}],
  videos:[{emoji:"🎬",hue:280,size:420,dur:"2:14"}],
  icloudSkipped:1,
  sel:new Set(),
};
const fmt=b=>b>=GB?(b/GB).toFixed(1)+" GB":Math.round(b/MB)+" MB";
function itemSize(id){const[k,a,b]=id.match(/^([gsv])(\d+)(?:-(\d+))?$/).slice(1);
  if(k==="g")return state.groups[a].sizes[b]*MB;
  if(k==="s")return state.shots[a].size*MB; return state.videos[a].size*MB;}
function selectedBytes(){let s=state.junk;state.sel.forEach(id=>s+=itemSize(id));return s;}
function photoCount(){return state.sel.size;}

/* ===== 勾选守卫（镜像 toggleAssetSelection：每组必留一张）===== */
function toggleSel(id){
  const m=id.match(/^g(\d+)-(\d+)$/);
  if(state.sel.has(id)){state.sel.delete(id);}
  else{
    if(m){const g=state.groups[+m[1]];
      const unsel=g.emojis.filter((_,i)=>!state.sel.has(`g${m[1]}-${i}`)).length;
      if(unsel<=1){showToast(t("keeperGuard"));return;}}
    state.sel.add(id);
  }
  renderPreview();updateCleanBtn();
}
function allRedundantSelected(){
  const gs=visibleGroups();if(!gs.length)return false;
  return gs.every(({g,gi})=>g.emojis.every((_,i)=>i===0||state.sel.has(`g${gi}-${i}`)));
}
function visibleGroups(){return state.groups.map((g,gi)=>({g,gi}))
  .filter(({g})=>!g.similar||isPro);}  // 相似组=深度扫描结果，仅 Pro 可见
function selectAllToggle(){
  if(!isPro){openSheet('paywall');return;}
  if(allRedundantSelected()){ // 取消勾选
    visibleGroups().forEach(({g,gi})=>g.emojis.forEach((_,i)=>state.sel.delete(`g${gi}-${i}`)));
  }else{
    visibleGroups().forEach(({g,gi})=>g.emojis.forEach((_,i)=>{ if(i>0)state.sel.add(`g${gi}-${i}`);}));
  }
  renderPreview();updateCleanBtn();
}

/* ============ 渲染 ============ */
function thumbHTML(id,item,opts={}){
  const sel=state.sel.has(id);
  const cls=["thumb",sel?"sel":"",opts.keeper?"keeper":"",item.cloud?"cloud":""].join(" ");
  const grad=`linear-gradient(135deg,hsl(${item.hue} 35% 30%),hsl(${item.hue+40} 45% 18%))`;
  const events=`onclick="onThumbTap('${id}',${!!opts.keeper},${!!item.cloud})" `+
    `onpointerdown="lpStart('${id}')" onpointerup="lpEnd()" onpointerleave="lpEnd()"`;
  return `<div class="${cls}" ${events} style="background:${item.cloud?'var(--card)':grad}">
    <div class="ph">${item.cloud&&!item.loaded?"☁️":item.emoji}</div>
    ${opts.keeper?`<span class="keep-tag">${t("preview.keep")}</span>`:`<span class="chk">✓</span>`}
    ${opts.dur?`<span class="dur-tag">▶ ${opts.dur}</span>`:""}</div>`;
}
function onThumbTap(id,keeper,cloud){
  if(window._lpFired){window._lpFired=false;return;}
  if(keeper||cloud)return;            // 保留项/不可见照片：不可勾选
  toggleSel(id);
}
function renderPreview(){
  document.getElementById("dupGroups").innerHTML=visibleGroups().map(({g,gi})=>{
    const wasted=g.sizes.slice(1).reduce((a,b)=>a+b,0).toFixed(1)+" MB";
    const thumbs=g.emojis.map((e,i)=>thumbHTML(`g${gi}-${i}`,{emoji:e,hue:g.hues[i]},{keeper:i===0})).join("");
    return `<div class="group-meta"><span>${t(g.similar?"preview.similarGroup":"preview.dupGroup",g.emojis.length)}</span><b>${wasted}</b></div>
      <div class="thumb-row">${thumbs}</div>`;}).join("");
  document.getElementById("shotGrid").innerHTML=state.shots.map((s,i)=>thumbHTML(`s${i}`,s)).join("");
  document.getElementById("shotCount").textContent=state.shots.length;
  document.getElementById("videoGrid").innerHTML=state.videos.map((v,i)=>thumbHTML(`v${i}`,v,{dur:v.dur})).join("");
  document.getElementById("selAllBtn").textContent=
    !isPro?t("preview.selectAll.pro"):(allRedundantSelected()?t("preview.deselectAll"):t("preview.selectAll"));
  document.getElementById("deepHint").style.display=isPro?"none":"block";
  const icn=document.getElementById("icloudNote");
  icn.style.display=state.icloudSkipped>0?"block":"none";
  icn.querySelector("span").textContent=t("preview.icloudSkipped",state.icloudSkipped);
}
function updateCleanBtn(){
  const b=document.getElementById("cleanBtn"),bytes=selectedBytes();
  b.textContent=t("preview.clean",fmt(bytes)); b.disabled=bytes<=0;
}
function renderLangList(){
  const codes=["",...Object.keys(I18N)];
  document.getElementById("langList").innerHTML=codes.map(c=>{
    const name=c===""?t("settings.language.system"):LANG_NAMES[c];
    return `<div class="lang-row" onclick="setLang('${c}')"><span>${name}</span>${c===langPref?'<span class="tick">✓</span>':""}</div>`;
  }).join("");
}
function renderSubUI(){
  document.getElementById("subStatus").textContent=isPro?t("settings.status.active"):t("settings.status.free");
  document.getElementById("subStatus").style.color=isPro?"var(--accent)":"var(--t2)";
  document.getElementById("manageBtn").textContent=isPro?t("settings.manage"):t("settings.upgrade");
}

/* ============ 流程 ============ */
function show(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");}
function goHome(){state.sel.clear();show("s-home");}
function startScan(){
  show("s-scan");
  const ring=document.getElementById("scanRing"),pct=document.getElementById("scanPct");
  const C=439.8;let p=0;
  const timer=setInterval(()=>{
    p=Math.min(100,p+2+Math.random()*2.5);
    ring.style.strokeDashoffset=C*(1-p/100);pct.textContent=Math.floor(p)+"%";
    if(p>=100){clearInterval(timer);setTimeout(()=>{
      state.sel.clear();
      if(isPro){ // Pro：默认勾选精确重复组的冗余项（批量能力）
        state.groups.forEach((g,gi)=>{if(!g.similar)g.emojis.forEach((_,i)=>{if(i>0)state.sel.add(`g${gi}-${i}`);});});
      }
      renderPreview();updateCleanBtn();show("s-preview");},350);}
  },55);
}
/* 单次确认：含照片→系统框（Apple 强制，批量一次）；仅缓存→自家弹窗 */
function tryClean(){
  if(photoCount()>0){
    document.getElementById("sysTi").textContent=t("sys.deleteTitle",photoCount());
    document.getElementById("sysAlert").classList.add("open");
  }else{
    document.getElementById("ownMsg").textContent=t("confirm.message",0,fmt(state.junk));
    document.getElementById("ownAlert").classList.add("open");
  }
}
function hideSys(){document.getElementById("sysAlert").classList.remove("open");}
function hideOwn(){document.getElementById("ownAlert").classList.remove("open");}
function confirmSysDelete(){hideSys();doClean();}
function confirmOwnClean(){hideOwn();doClean();}
function doClean(){
  const freed=fmt(selectedBytes());show("s-cleaning");
  setTimeout(()=>{document.getElementById("freedTxt").textContent=t("result.freed",freed);
    show("s-done");state.sel.clear();state.junk=0;},1500);
}

/* ============ 大图查看器：长按进入，双击缩放/拖移，iCloud 载入高清 ============ */
let lpTimer=null;window._lpFired=false;let viewerId=null,vZoom=1,vOff={x:0,y:0},vDrag=null;
function lpStart(id){lpTimer=setTimeout(()=>{window._lpFired=true;openViewer(id);},350);}
function lpEnd(){clearTimeout(lpTimer);}
function viewerItem(id){const[k,a,b]=id.match(/^([gsv])(\d+)(?:-(\d+))?$/).slice(1);
  if(k==="g")return{emoji:state.groups[a].emojis[b],keeper:+b===0,cloud:false};
  if(k==="s")return{...state.shots[a],keeper:false};return{...state.videos[a],keeper:false};}
function openViewer(id){
  viewerId=id;vZoom=1;vOff={x:0,y:0};applyV();
  document.getElementById("viewer").classList.add("open");renderViewerFoot();
  const it=viewerItem(id);
  document.getElementById("vPic").textContent=(it.cloud&&!it.loaded)?"☁️":it.emoji;
}
function closeViewer(){document.getElementById("viewer").classList.remove("open");viewerId=null;}
function renderViewerFoot(){
  const it=viewerItem(viewerId);const sel=state.sel.has(viewerId);
  let html=`<div class="caption">${t("viewer.zoomHint")}</div>`;
  if(it.cloud&&!it.loaded)
    html+=`<button class="hd-btn" onclick="loadHD()">${t("viewer.loadHD")}</button><div class="progress" id="hdProg" style="display:none"><i></i></div>`;
  if(it.keeper)
    html+=`<span class="keep-tag" style="position:static;font-size:12px;padding:6px 14px">${t("preview.keep")}</span>`;
  else if(!(it.cloud&&!it.loaded))
    html+=`<button class="vbtn" style="background:${sel?"var(--accent)":"var(--card)"};color:${sel?"#000":"var(--t1)"}"
      onclick="toggleSel(viewerId);renderViewerFoot()">${sel?"✓ "+t("viewer.deselect"):t("viewer.select")}</button>`;
  document.getElementById("vFoot").innerHTML=html;
}
function loadHD(){ // 用户主动、单张、仅下行——全 App 唯一联网路径
  const prog=document.getElementById("hdProg");prog.style.display="block";let p=0;
  const timer=setInterval(()=>{p+=8+Math.random()*10;prog.firstElementChild.style.width=Math.min(100,p)+"%";
    if(p>=100){clearInterval(timer);
      const[,a]=viewerId.match(/^s(\d+)/);state.shots[a].loaded=true;state.shots[a].emoji="🌄";state.shots[a].cloud=false;
      document.getElementById("vPic").textContent="🌄";renderViewerFoot();renderPreview();}
  },120);
}
function applyV(){document.getElementById("vPic").style.transform=
  `translate(${vOff.x}px,${vOff.y}px) scale(${vZoom})`;}
const stage=document.getElementById("vStage");
stage.addEventListener("dblclick",()=>{vZoom=vZoom>1?1:2.5;if(vZoom===1)vOff={x:0,y:0};applyV();});
stage.addEventListener("pointerdown",e=>{if(vZoom>1)vDrag={x:e.clientX-vOff.x,y:e.clientY-vOff.y};});
stage.addEventListener("pointermove",e=>{if(vDrag){vOff={x:e.clientX-vDrag.x,y:e.clientY-vDrag.y};applyV();}});
stage.addEventListener("pointerup",()=>vDrag=null);

/* ============ 订阅 / 设置 ============ */
function openSheet(n){document.getElementById("mask").classList.add("open");
  document.getElementById("sheet-"+n).classList.add("open");}
function closeSheets(){document.getElementById("mask").classList.remove("open");
  document.querySelectorAll(".sheet").forEach(s=>s.classList.remove("open"));}
function subscribe(){
  isPro=true;document.body.classList.add("is-pro");
  document.getElementById("upgradeEntry").style.display="none";closeSheets();
  showToast("✓ Pro 已激活 · 3 天试用开始（演示）");
  // 解锁批量：补上默认勾选 + 显示相似组
  state.groups.forEach((g,gi)=>{if(!g.similar)g.emojis.forEach((_,i)=>{if(i>0)state.sel.add(`g${gi}-${i}`);});});
  renderPreview();updateCleanBtn();renderSubUI();
}
function manageSub(){isPro?showToast("（演示）打开系统订阅管理面板"):openSheet('paywall');}
function toggleAuto(){
  if(!isPro){closeSheets();setTimeout(()=>openSheet('paywall'),250);return;}
  autoClean=!autoClean;document.getElementById("autoSwitch").classList.toggle("on",autoClean);
}
function setLang(c){langPref=c;applyLang();}
let toastTimer;
function showToast(m){const el=document.getElementById("toast");el.textContent=m;
  el.classList.add("show");clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove("show"),2200);}

applyLang();
</script>
</body>
